model_name: Three pulses
description:
  A demes model with flexible parameters. Represents a population X founded a generations ago by EUR and NAT, then subsequent AFT migration, 
  then subsequent EUR migration.
time_units: generations
demes:
  - name: EUR
  - name: NAT
  - name: targetpop
    ancestors: [EUR, NAT]
    proportions: [REUR,1-REUR]
    start_time: t1

pulses:
  - sources: [AFR]
    dest: targetpop
    proportions: [RAFR]
    time: t2

  - sources: [EUR]
    dest: targetpop
    proportions: [REUR2]
    time: t3