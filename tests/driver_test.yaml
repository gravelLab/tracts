samples:
  directory: ./data/
  individual_names: [
    "NA19700"
    ]
  male_names : ["NA19700"] #these need to be double-checked. If not included, will assume that individuals with single X are male
  filename_format: "{name}_{label}.bed"
  labels: [A, B] #If this field is omitted, 'A' and 'B' will be used by default
  chromosomes: [1]
  allosomes: [X]
model_filename: pp.yaml
start_params: 
  tx: 6:8
  R: 0
repetitions: 2
seed: 100
exclude_tracts_below_cM: 0
time_scaling_factor: 100 #Times will be scaled down by this much when running the optimizer.

