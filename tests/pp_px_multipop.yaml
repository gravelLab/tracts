model_name: Two_Pulse
description:
  A simple model in which populations EUR and AFR arrive discretely at
  first generation, and a subsequent migration of EUR occurs at time T2.
demes:
  - name: EUR
  - name: AFR
  - name: W
    ancestors: [EUR, AFR]
    proportions: [Q, 1-Q]
    start_time: tq
    
  - name: X
    ancestors: [EUR, AFR]
    proportions: [R, 1-R]
    start_time: tx
pulses:
  - sources: [EUR]
    dest: W
    proportions: [Q1]
    time: tq2
  - sources: [AFR]
    dest: X
    proportions: [Q2]
    time: tx2