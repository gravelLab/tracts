model_name: One_Pulse
description:
  A demes model with flexible parameters. Represents a population X founded a generations ago by EUR and AFR.
time_units: generations
demes:
  - name: EUR
  - name: AFR

  - name: W
    ancestors: [EUR, AFR]
    proportions: [Q, 1-Q]
    start_time: tq
    
  - name: X
    ancestors: [EUR, AFR]
    proportions: [R, 1-R]
    start_time: tx